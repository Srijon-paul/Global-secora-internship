<!DOCTYPE html>

	<meta charset="UTF-8" />

		<section class="contact-panel">

				<h2>Get in Touch</h2>
				<p>Email: srijonpaul003@gmail.com</p>

			</div>

				<form class="contact-form">
					<label>

					</label>
					<label>
						Email
						<input type="email" placeholder="Your email" />
